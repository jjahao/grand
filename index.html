<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>GRAND 日本集運代購</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="hd">
  <div class="hd-inner">
    <a class="logo" href="#">
      <span class="logo-mark">G</span>
      <span class="logo-text">GRAND</span>
      <span class="logo-sub">日本代購</span>
    </a>
    <div class="hd-actions">
      <a class="hd-member" href="https://grand.shop2000.com.tw/member" target="_blank" rel="noopener">👤 會員登入</a>
      <a class="hd-line" href="https://line.me/ti/p/~@562spzag" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#06C755" d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.070 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
        LINE
      </a>
    </div>
  </div>
  <div class="hd-search">
    <input id="search" type="search" inputmode="search" placeholder="搜尋商品…" autocomplete="off">
  </div>
  <div class="hd-cats" id="catBar">
    <button class="cat-btn active" data-cat="all">全部</button>
  </div>
</header>

<!-- ===== HERO ===== -->
<section class="hero" id="heroSection">
  <div class="hero-inner">
    <p class="hero-eyebrow">日本直送・快速專業</p>
    <h1 class="hero-title">GRAND 天倉</h1>
    <p class="hero-sub">日本各大批店商品・MDM 進價直送台灣</p>
    <a href="https://line.me/ti/p/~@562spzag" class="hero-btn" target="_blank" rel="noopener">加入 LINE 詢問</a>
  </div>
</section>

<!-- ===== MAIN ===== -->
<main>
  <div id="grid" class="grid"></div>
  <div id="emptyMsg" class="empty-msg" hidden>找不到符合的商品</div>
  <div id="loadingMsg" class="loading-msg">載入商品中…</div>
</main>

<!-- ===== LIGHTBOX ===== -->
<div id="lb" class="lb" hidden role="dialog" aria-modal="true">
  <div class="lb-backdrop" id="lbBackdrop"></div>
  <div class="lb-card">
    <button class="lb-close" id="lbClose" aria-label="關閉">✕</button>
    <div class="lb-img-wrap">
      <img id="lbImg" src="" alt="" loading="lazy">
    </div>
    <div class="lb-body">
      <p class="lb-code" id="lbCode"></p>
      <h2 class="lb-name" id="lbName"></h2>
      <div class="lb-price-row">
        <span class="lb-price" id="lbPrice"></span>
      </div>
      <p class="lb-desc" id="lbDesc"></p>
      <button id="lbAddBtn" class="lb-buy-btn" type="button">🛒 加入購物車</button>
      <a class="lb-line-btn" href="https://line.me/ti/p/~@562spzag" target="_blank" rel="noopener">
        LINE 詢問這件
      </a>
    </div>
  </div>
</div>

<!-- ===== 購物車浮動列 ===== -->
<button id="cartBar" class="cart-bar" type="button" hidden>
  <span class="cart-bar-ic">🛒</span>
  <span id="cartBarText" class="cart-bar-text">購物車</span>
  <span class="cart-bar-go">查看 →</span>
</button>

<!-- ===== 購物車抽屜 ===== -->
<div id="cartDrawer" class="cart-drawer" hidden role="dialog" aria-modal="true">
  <div class="cart-backdrop" id="cartBackdrop"></div>
  <div class="cart-panel">
    <div class="cart-head">
      <span class="cart-title">🛒 我的購物車</span>
      <button class="cart-close" id="cartClose" type="button" aria-label="關閉">✕</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div id="cartEmpty" class="cart-empty" hidden>購物車是空的，去挑幾樣吧！</div>
    <div class="cart-foot">
      <div class="cart-total-row"><span>合計</span><span id="cartTotal" class="cart-total">NT$0</span></div>
      <button id="cartLineBtn" class="cart-line-btn" type="button">📩 用 LINE 送出訂單</button>
      <a id="cartShopBtn" class="cart-shop-btn" href="https://grand.shop2000.com.tw/" target="_blank" rel="noopener">到官網結帳</a>
      <p class="cart-note">送出後訂單明細會自動複製，貼到 LINE 給我們即可 🙌</p>
    </div>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
